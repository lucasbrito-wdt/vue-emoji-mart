name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library (@luquinhasbrito/vue-emoji-mart)
        run: pnpm --filter @luquinhasbrito/vue-emoji-mart run build

      - name: Run tests
        run: pnpm --filter @luquinhasbrito/vue-emoji-mart run test

      - name: Build examples/vite-demo
        run: pnpm --filter vue-emoji-mart-vite-demo run build
